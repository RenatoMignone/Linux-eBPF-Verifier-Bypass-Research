#cloud-config

# Hostname
hostname: ubuntu

# User configuration
users:
  - name: ubuntu
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    lock_passwd: false
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIAED7R76db+mr+nuBwBn7i0y5jOUq4NazMIlUay5Q2c SVT Project VM

# Set simple password: "u" (one character, easy to type)
chpasswd:
  expire: false
  users:
    - name: ubuntu
      type: text
      password: u

# Package updates and installation
package_update: true
package_upgrade: true

packages:
  # Build essentials
  - build-essential
  - git
  - make
  - pkg-config
  - gcc-multilib
  
  # LLVM/Clang for eBPF compilation
  - clang
  - llvm
  - libclang-dev
  
  # BPF tools and libraries
  - libbpf-dev
  - linux-tools-common
  - linux-tools-generic
  - bpftool
  
  # Libraries for xdp_synproxy user-space loader
  - binutils-dev
  - libcap-dev
  - libmnl-dev
  - libelf-dev
  - zlib1g-dev
  
  # Kernel headers (for current kernel)
  - linux-headers-generic
  
  # Network tools for testing
  - tcpdump
  - wireshark-common
  - tshark
  - netcat-openbsd
  - hping3
  - iperf3
  - net-tools
  
  # Development utilities
  - tmux
  - vim
  - curl
  - wget
  - jq
  
  # Go (for xvtlas tool)
  - golang-go
  
  # Python (for pretty-verifier)
  - python3
  - python3-pip

# Run commands after boot
runcmd:
  # Ensure bpftool is accessible
  - ln -sf /usr/lib/linux-tools/*/bpftool /usr/local/bin/bpftool || true
  
  # Create asm symlink for BPF compilation
  - ln -sf /usr/include/asm-generic /usr/include/asm || true
  
  # Create working directory for eBPF tests
  - mkdir -p /home/ubuntu/ebpf-tests
  - chown -R ubuntu:ubuntu /home/ubuntu/ebpf-tests
  
  # Enable JIT compilation for eBPF (better performance)
  - echo 1 > /proc/sys/net/core/bpf_jit_enable
  
  # Make JIT setting persistent
  - echo "net.core.bpf_jit_enable = 1" >> /etc/sysctl.conf
  
  # Mount shared folder from host (virtiofs)
  - mkdir -p /mnt/shared
  - echo "host_shared /mnt/shared virtiofs defaults,nofail 0 0" >> /etc/fstab
  - mount -a || true
  - chown ubuntu:ubuntu /mnt/shared || true
  
  # Create symlink in home directory for convenience
  - ln -sf /mnt/shared /home/ubuntu/shared
  
  # ============================================
  # eBPF/XDP SYNPROXY SETUP (auto-configuration)
  # ============================================
  
  # Load required kernel modules for BPF CT kfuncs
  - modprobe nf_conntrack
  - modprobe nf_conntrack_netlink
  - modprobe nf_nat
  - modprobe nf_tables
  - modprobe nft_ct
  - modprobe nft_synproxy
  
  # Make modules load on boot
  - echo "nf_conntrack" >> /etc/modules-load.d/ebpf.conf
  - echo "nf_conntrack_netlink" >> /etc/modules-load.d/ebpf.conf
  - echo "nf_nat" >> /etc/modules-load.d/ebpf.conf
  - echo "nf_tables" >> /etc/modules-load.d/ebpf.conf
  - echo "nft_ct" >> /etc/modules-load.d/ebpf.conf
  - echo "nft_synproxy" >> /etc/modules-load.d/ebpf.conf
  
  # Set synproxy-related sysctl settings
  - sysctl -w net.ipv4.tcp_syncookies=2
  - sysctl -w net.ipv4.tcp_timestamps=1
  - sysctl -w net.netfilter.nf_conntrack_tcp_loose=0
  
  # Make sysctl settings persistent
  - echo "net.ipv4.tcp_syncookies = 2" >> /etc/sysctl.conf
  - echo "net.ipv4.tcp_timestamps = 1" >> /etc/sysctl.conf
  - echo "net.netfilter.nf_conntrack_tcp_loose = 0" >> /etc/sysctl.conf
  
  # Generate vmlinux.h from kernel BTF (required for eBPF compilation)
  # Note: Path includes /codebase/ because vmctl.sh copies the codebase folder structure
  - bash -c 'sleep 10 && bpftool btf dump file /sys/kernel/btf/vmlinux format c > /mnt/shared/codebase/XDPs/xdp_synproxy/vmlinux.h 2>/dev/null || true'
  
  # Compile XDP SynProxy (after vmlinux.h is generated)
  - bash -c 'sleep 15 && cd /mnt/shared/codebase/XDPs/xdp_synproxy && make clean && make 2>&1 | tee /home/ubuntu/compile.log || true'
  - chown ubuntu:ubuntu /home/ubuntu/compile.log || true

# Final message
final_message: "eBPF development VM ready! Shared folder at /mnt/shared. XDP SynProxy compiled. Boot took $UPTIME seconds."
